about_content: | # this will include new lines to allow paragraphs
  I am a theoretical physicist working at the intersection of quantum control, quantum computing, and stochastic dynamics, with a strong background in general relativity and differential geometry. [file:1]
  
  My research bridges theoretical quantum control and quantum simulation of open and closed quantum systems. I develop advanced control protocols for open quantum systems, including path-integral quantum control (PiQC) algorithms and stochastic optimal control frameworks, with applications to measurement-based quantum computing and near-term quantum hardware. [file:1]
  
  I am most skilled in: <mark>Quantum Control & Feedback</mark>, <mark>Stochastic Quantum Dynamics</mark>, and <mark>Quantum Computing Theory & Algorithms</mark>. [file:1]

